services:
  jhand-db:
    image: postgres:16-alpine
    container_name: jhand-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: JHand
    ports:
      - "5432:5432"
    volumes:
      - jhand-pgdata:/var/lib/postgresql/data

volumes:
  jhand-pgdata:
    name: jhand-pgdata
